<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>黄梅戏 · 语气地图</title>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4efe8;
            font-family: '宋体', 'SimSun', 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .story-container {
            max-width: 920px;
            width: 100%;
            background: rgba(255, 252, 247, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            box-shadow: 0 20px 48px rgba(80, 60, 40, 0.10), 0 4px 12px rgba(0, 0, 0, 0.03);
            padding: 2.2rem 2.2rem 2.6rem 2.2rem;
            border: 1px solid #ede3d8;
            position: relative;
            overflow: hidden;
        }

        /* ===== 标题 ===== */
        .title-section {
            text-align: center;
            margin-bottom: 1.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px dashed #e6d3c0;
        }
        .title-section h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #7a4d34;
            letter-spacing: 0.04em;
            font-family: '宋体', 'SimSun', serif;
        }
        .title-section .sub {
            font-size: 0.9rem;
            color: #a07d64;
            max-width: 680px;
            margin: 0.4rem auto 0;
            line-height: 1.6;
            font-family: '宋体', 'SimSun', serif;
        }

        /* ===== 主卡片 ===== */
        .vibe-card {
            background: rgba(255, 248, 240, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 44px;
            padding: 1.8rem 2rem 2rem 2rem;
            box-shadow: 0 8px 24px rgba(80, 60, 40, 0.06);
            border: 1px solid #f2e4d6;
        }

        /* ===== 环形图区 ===== */
        .pie-ring-section {
            text-align: center;
            margin-bottom: 1.6rem;
        }
        .pie-title {
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: #a57a5a;
            margin-bottom: 0.8rem;
            background: #f3e6d9;
            display: inline-block;
            padding: 0 20px;
            border-radius: 40px;
            font-family: '宋体', 'SimSun', serif;
        }
        .ring-canvas-container {
            display: flex;
            justify-content: center;
            gap: 2.4rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .ring-card {
            background: rgba(255, 248, 244, 0.9);
            border-radius: 28px;
            padding: 0.4rem 0.6rem 0.6rem;
            width: 130px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid #ede1d4;
            cursor: pointer;
        }
        .ring-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
        }
        canvas.ring-canvas {
            width: 80px;
            height: 80px;
            display: block;
            margin: 0 auto;
        }
        .ring-label {
            margin-top: 4px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #5a3a1e;
            font-family: '宋体', 'SimSun', serif;
        }
        .ring-percent {
            font-size: 0.6rem;
            color: #b58a6a;
        }

        /* ============================================================ */
        /* ===== 插画地图区（背景已替换为您的图片） ===== */
        /* ============================================================ */
        .map-area {
            margin-top: 1.2rem;
            position: relative;
            border-radius: 32px;
            padding: 0;
            overflow: hidden;
            border: 1px solid #f0e3d5;
            min-height: 380px;
        }

        /* 背景图片容器 */
        .map-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none; /* 允许点击穿透到 Canvas */
        }

        /* 地图画布（透明，负责绘制节点和路径） */
        #mapCanvas {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 340px;
            display: block;
            background: transparent;
            cursor: pointer;
            touch-action: none;
        }

        /* ===== 地图下方信息展示 ===== */
        .map-info {
            text-align: center;
            margin-top: 16px;
            min-height: 70px;
            transition: all 0.4s ease;
        }
        .map-info .era-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #7a4d34;
            font-family: '宋体', 'SimSun', serif;
        }
        .map-info .era-tag {
            font-size: 0.85rem;
            color: #a07d64;
            font-weight: 500;
        }
        .map-info .era-quote {
            font-size: 0.95rem;
            color: #4a3222;
            line-height: 1.6;
            margin-top: 4px;
            font-family: '宋体', 'SimSun', serif;
        }
        .map-info .era-source {
            font-size: 0.7rem;
            color: #b58a6a;
            display: block;
            margin-top: 2px;
        }

        /* ===== 底部原话 ===== */
        .quote-compact {
            max-width: 780px;
            margin: 1.4rem auto 0;
            padding: 0.2rem 0.2rem;
            text-align: center;
            font-family: '宋体', 'SimSun', serif;
        }
        .quote-compact .q-head {
            font-weight: 600;
            font-size: 0.85rem;
            color: #7b5d40;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .quote-compact .q-item {
            font-size: 0.82rem;
            color: #3f3224;
            line-height: 1.5;
            border-bottom: 1px dashed #e6d3c0;
            padding: 4px 0;
        }
        .quote-compact .q-item:last-child {
            border-bottom: none;
        }
        .quote-compact .q-item strong {
            color: #7a5336;
            font-weight: 600;
        }
        .quote-compact .q-foot {
            font-size: 0.65rem;
            color: #b28252;
            margin-top: 4px;
        }

        .footnote {
            font-size: 0.55rem;
            color: #b3936e;
            text-align: center;
            margin-top: 0.6rem;
        }

        @media (max-width: 640px) {
            .story-container { padding: 1.2rem; }
            .vibe-card { padding: 1.2rem; }
            .ring-canvas-container { gap: 1rem; }
            .ring-card { width: 100px; padding: 0.2rem; }
            .title-section h1 { font-size: 1.6rem; }
            #mapCanvas { height: 240px; }
            .map-info .era-name { font-size: 1rem; }
            .map-info .era-quote { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="story-container">
        <div class="title-section">
            <h1>🎶 黄梅戏 · 语气地图</h1>
            <div class="sub">从“别人评弹我”到“我有了自己的声音” <br> 1953–2024，语气能量的呼吸与变迁</div>
        </div>

        <div class="vibe-card">
            <!-- 环形图区 -->
            <div class="pie-ring-section">
                <div class="pie-title">📊 三段时代 · 语气权重</div>
                <div class="ring-canvas-container">
                    <div class="ring-card" data-era="early">
                        <canvas id="ringEarly" width="100" height="100" class="ring-canvas"></canvas>
                        <div class="ring-label">早期 · 被评弹</div>
                        <div class="ring-percent">外部定义 <span id="ringEarlyPercent">68</span>%</div>
                    </div>
                    <div class="ring-card" data-era="mid">
                        <canvas id="ringMid" width="100" height="100" class="ring-canvas"></canvas>
                        <div class="ring-label">中期 · 自信哒</div>
                        <div class="ring-percent">自主表达 <span id="ringMidPercent">72</span>%</div>
                    </div>
                    <div class="ring-card" data-era="recent">
                        <canvas id="ringRecent" width="100" height="100" class="ring-canvas"></canvas>
                        <div class="ring-label">近期 · 焦虑惊叹</div>
                        <div class="ring-percent">叹号+焦虑 <span id="ringRecentPercent">62</span>%</div>
                    </div>
                </div>
            </div>

            <!-- ===== 地图区（背景已替换为您提供的图片） ===== -->
            <div class="map-area">
                <!-- 
                    🔴 替换图片：将下方 src 换成您那张黄梅戏插画图片的路径 
                    例如： src="黄梅戏地图.jpg" 或 src="./images/huangmei-map.png"
                -->
                <img src="assets/地图.jpg" alt="黄梅戏地图背景" class="map-bg" id="mapBg">
                <canvas id="mapCanvas"></canvas>
            </div>

            <!-- 信息展示 -->
            <div class="map-info" id="mapInfo">
                <div class="era-name" id="mapEraName">早期 · 被评弹</div>
                <div class="era-tag" id="mapEraTag">🎙️ 外部定义占主导</div>
                <div class="era-quote" id="mapEraQuote">“黄梅戏不过是草台班子腔调，缺少正统风范。”</div>
                <span class="era-source" id="mapEraSource">—— 五十年代艺评</span>
            </div>
        </div>

        <!-- 底部原话 -->
        <div class="quote-compact">
            <div class="q-head">🗣️ 语气小剧场 · 原话还原</div>
            <div class="q-item"><strong>1957年</strong>：“黄梅戏过于土气，缺少规范…”</div>
            <div class="q-item"><strong>1989年</strong>：“我们要唱出自己的乡音，黄梅戏不输任何剧种！”</div>
            <div class="q-item"><strong>2022年</strong>：“天哪！传统戏曲怎么破圈？黄梅戏还能惊艳Z世代吗？！”</div>
            <div class="q-foot">🎙️ 声纹档案馆 · 语气聚类分析</div>
        </div>
    </div>

    <script>
        (function() {
            // ===== 环形图 =====
            function drawRing(canvasId, percent, color) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const size = 100;
                canvas.width = size;
                canvas.height = size;
                const cx = 50, cy = 50, radius = 34;
                const start = -0.5 * Math.PI;
                const end = start + (percent / 100) * 2 * Math.PI;
                ctx.clearRect(0, 0, size, size);
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
                ctx.strokeStyle = "#e6d3c0";
                ctx.lineWidth = 8;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, radius, start, end);
                ctx.strokeStyle = color;
                ctx.lineWidth = 8;
                ctx.stroke();
                ctx.fillStyle = "#7a4d34";
                ctx.font = "bold 16px '宋体', 'SimSun', serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(Math.floor(percent) + "%", cx, cy);
            }
            drawRing("ringEarly", 68, "#dbb8a0");
            drawRing("ringMid", 72, "#c4a088");
            drawRing("ringRecent", 62, "#b8947a");

            // ============================================================
            // 地图探险（节点位置已根据您提供的插画调整）
            // ============================================================
            const canvas = document.getElementById('mapCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;

            // 三个节点坐标（根据插画布局重新定位）
            const nodes = [
                { id: 'early', label: '早期', x: 0.15, y: 0.55 },  // 左侧，靠近旦角
                { id: 'mid',   label: '中期', x: 0.50, y: 0.40 },  // 中间，靠近徽派建筑
                { id: 'recent', label: '近期', x: 0.85, y: 0.55 }  // 右侧，靠近祥云/水袖
            ];

            // 路线路径：经过三个节点的弧线
            const pathPoints = [
                { x: 0.15, y: 0.55 },
                { x: 0.25, y: 0.50 },
                { x: 0.38, y: 0.45 },
                { x: 0.50, y: 0.40 },
                { x: 0.62, y: 0.45 },
                { x: 0.75, y: 0.50 },
                { x: 0.85, y: 0.55 }
            ];

            let currentEra = 'early';
            let animating = false;
            let actorPos = { x: 0.15, y: 0.55 };

            // 时代数据
            const eraData = {
                early: {
                    label: '早期 · 被评弹',
                    tag: '🎙️ 外部定义占主导',
                    quote: '“黄梅戏不过是草台班子腔调，缺少正统风范。”',
                    source: '—— 五十年代艺评',
                    color: '#dbb8a0'
                },
                mid: {
                    label: '中期 · 自信发声',
                    tag: '💪 自主表达昂扬',
                    quote: '“我们要唱响自己的声音！黄梅戏的时代已经到来！”',
                    source: '—— 1987年改革座谈会',
                    color: '#c4a088'
                },
                recent: {
                    label: '近期 · 焦虑惊叹',
                    tag: '😟 叹号与焦虑交织',
                    quote: '“天哪！传统戏曲怎么破圈？黄梅戏还能惊艳Z世代吗？！”',
                    source: '—— 2022年社交媒体',
                    color: '#b8947a'
                }
            };

            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                width = rect.width;
                height = 340;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                ctx.scale(dpr, dpr);
                drawMap();
            }

            // 绘制地图（仅绘制节点和路径，背景已使用您的图片）
            function drawMap() {
                ctx.clearRect(0, 0, width, height);

                // ---- 水袖飘带（贯穿路径） ----
                ctx.save();
                ctx.globalAlpha = 0.35;
                ctx.strokeStyle = '#c4a088';
                ctx.lineWidth = 4;
                ctx.setLineDash([6, 8]);
                ctx.beginPath();
                ctx.moveTo(pathPoints[0].x * width, pathPoints[0].y * height);
                for (let i = 1; i < pathPoints.length; i++) {
                    ctx.lineTo(pathPoints[i].x * width, pathPoints[i].y * height);
                }
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();

                // ---- 节点（地标） ----
                nodes.forEach((node, idx) => {
                    const x = node.x * width;
                    const y = node.y * height;
                    const isActive = (node.id === currentEra);
                    const radius = isActive ? 24 : 20;
                    const color = eraData[node.id].color;

                    // 光环（选中态）
                    if (isActive) {
                        ctx.shadowColor = 'rgba(122,77,52,0.15)';
                        ctx.shadowBlur = 24;
                    }

                    // 戏台底座
                    ctx.fillStyle = color;
                    ctx.shadowColor = 'rgba(0,0,0,0.04)';
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // 金边
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, 2 * Math.PI);
                    ctx.strokeStyle = isActive ? '#f4e8d8' : '#e8ddd0';
                    ctx.lineWidth = isActive ? 3 : 2;
                    ctx.stroke();

                    // 节点内文字
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px "宋体", "SimSun", serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(node.label, x, y);

                    // 小装饰旗（只在选中时显示）
                    if (isActive) {
                        const flagX = x + radius * 0.7;
                        const flagY = y - radius * 0.9;
                        ctx.beginPath();
                        ctx.moveTo(flagX, flagY + 10);
                        ctx.lineTo(flagX, flagY - 8);
                        ctx.strokeStyle = '#a57a5a';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(flagX, flagY - 8);
                        ctx.lineTo(flagX + 14, flagY - 4);
                        ctx.lineTo(flagX, flagY);
                        ctx.fillStyle = color;
                        ctx.fill();
                    }
                });

                // ---- 角色（小戏角） ----
                const actorX = actorPos.x * width;
                const actorY = actorPos.y * height;
                ctx.font = '40px "宋体", "SimSun", serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.shadowBlur = 16;
                ctx.fillText('🎭', actorX, actorY);
                ctx.shadowBlur = 0;
            }

            // 移动角色到指定节点
            function moveToNode(nodeId) {
                if (animating) return;
                const targetNode = nodes.find(n => n.id === nodeId);
                if (!targetNode) return;
                if (targetNode.id === currentEra) {
                    updateInfo(nodeId);
                    drawMap();
                    return;
                }

                animating = true;
                const startPos = { x: actorPos.x, y: actorPos.y };
                const endPos = { x: targetNode.x, y: targetNode.y };
                const duration = 600;
                const startTime = Date.now();

                function animateStep() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const ease = progress < 0.5 ?
                        2 * progress * progress :
                        1 - Math.pow(-2 * progress + 2, 2) / 2;

                    actorPos.x = startPos.x + (endPos.x - startPos.x) * ease;
                    actorPos.y = startPos.y + (endPos.y - startPos.y) * ease;

                    drawMap();

                    if (progress < 1) {
                        requestAnimationFrame(animateStep);
                    } else {
                        actorPos.x = endPos.x;
                        actorPos.y = endPos.y;
                        currentEra = nodeId;
                        updateInfo(nodeId);
                        drawMap();
                        animating = false;
                    }
                }
                animateStep();
            }

            // 更新信息面板
            function updateInfo(nodeId) {
                const data = eraData[nodeId];
                document.getElementById('mapEraName').textContent = data.label;
                document.getElementById('mapEraTag').textContent = data.tag;
                document.getElementById('mapEraQuote').textContent = data.quote;
                document.getElementById('mapEraSource').textContent = data.source;
            }

            // 点击检测
            function handleCanvasClick(e) {
                if (animating) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = width / rect.width;
                const scaleY = height / rect.height;
                const mouseX = (e.clientX - rect.left) * scaleX;
                const mouseY = (e.clientY - rect.top) * scaleY;

                for (const node of nodes) {
                    const nx = node.x * width;
                    const ny = node.y * height;
                    const dist = Math.sqrt((mouseX - nx) ** 2 + (mouseY - ny) ** 2);
                    if (dist < 40) {
                        moveToNode(node.id);
                        return;
                    }
                }
            }

            // 触摸适配
            function handleTouch(e) {
                if (animating) return;
                const touch = e.touches[0];
                if (!touch) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = width / rect.width;
                const scaleY = height / rect.height;
                const touchX = (touch.clientX - rect.left) * scaleX;
                const touchY = (touch.clientY - rect.top) * scaleY;

                for (const node of nodes) {
                    const nx = node.x * width;
                    const ny = node.y * height;
                    const dist = Math.sqrt((touchX - nx) ** 2 + (touchY - ny) ** 2);
                    if (dist < 50) {
                        moveToNode(node.id);
                        return;
                    }
                }
            }

            // 环形卡片联动
            document.querySelectorAll('.ring-card').forEach(card => {
                card.addEventListener('click', function() {
                    const era = this.dataset.era;
                    moveToNode(era);
                });
            });

            // 初始化
            function initMap() {
                resizeCanvas();
                updateInfo('early');
                drawMap();
            }

            // 事件
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('touchstart', handleTouch, { passive: true });

            window.addEventListener('resize', () => {
                resizeCanvas();
            });

            initMap();

            // ===== 确保背景图片加载后绘制 =====
            const bgImg = document.getElementById('mapBg');
            if (bgImg.complete) {
                initMap();
            } else {
                bgImg.onload = function() {
                    initMap();
                };
            }

        })();
    </script>
</body>
</html>
